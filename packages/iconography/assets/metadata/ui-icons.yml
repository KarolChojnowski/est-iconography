# Canonical metadata for 16×16 UI icons.
# The canonical ID is the YAML key and aligns with Figma, catalogue, sprite and code.

ui-icon/exclamation-circle:
  label: Exclamation circle
  family: ui-icon
  source: bootstrap
  category: status
  tags: [alert, warning, attention, error]
  aliases: [warning circle, alert circle]
  status: approved
  construction: fill
  usage: Indicates a warning, issue or point requiring attention.
  source_name: exclamation-circle
  source_version: 1.13.1
  license: MIT

ui-icon/check-circle:
  label: Check circle
  family: ui-icon
  source: bootstrap
  category: status
  tags: [success, complete, confirmed, done]
  aliases: [success circle, confirmation]
  status: approved
  construction: fill
  usage: Indicates successful completion or confirmation.
  source_name: check-circle
  source_version: 1.13.1
  license: MIT

ui-icon/plus:
