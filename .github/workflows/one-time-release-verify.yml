name: One-time release verification

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/one-time-release-verify.yml'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for releases
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 18); do
            if gh release view v0.3.0 >/dev/null 2>&1 && gh release view v0.4.0 >/dev/null 2>&1; then
              exit 0
            fi
            sleep 10
          done
          echo 'Timed out waiting for both releases.' >&2
          exit 1

      - name: Download and validate release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          for version in 0.3.0 0.4.0; do
            tag="v${version}"
            dir="/tmp/${tag}"
            mkdir -p "$dir"
            gh release download "$tag" --dir "$dir"

            test -s "$dir/est-iconography-${version}.zip"
            test -s "$dir/est-ui-icons.svg"
            test -s "$dir/est-icons.svg"
            test -s "$dir/est-iconography-assets.json"

            actual=$(node -e "const fs=require('fs'); const value=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); process.stdout.write(value.libraryVersion)" "$dir/est-iconography-assets.json")
            test "$actual" = "$version"
          done

      - name: Remove temporary helper branches
        shell: bash
        run: |
          git push origin --delete \
            agent/unused \
            agent/release-tags-helper \
            one-time-release-tags \
            temp-release-tags \
            release-tags-runner \
            release-tag-helper 2>/dev/null || true

      - name: Record successful verification
        shell: bash
        run: |
          cat > release-verification.txt <<'EOF'
          v0.3.0 and v0.4.0 releases verified.
          Each release contains the versioned ZIP, both sprites and the asset manifest.
          Manifest versions match their release tags.
          EOF

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add release-verification.txt
          git commit -m 'Record release verification'
          git push origin HEAD:main
