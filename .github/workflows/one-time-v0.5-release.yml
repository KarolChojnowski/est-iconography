name: One-time v0.5.0 release

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/one-time-v0.5-release.yml'

permissions:
  contents: write

jobs:
  release:
    if: github.event.pull_request.head.ref == 'agent/v0.5-release-runner'
    runs-on: ubuntu-latest
    env:
      TARGET_SHA: 9c6a4bc5a20086fe2899ec5030569e1c14859c55
      VERSION: 0.5.0
      TAG: v0.5.0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Create immutable release tag
        shell: bash
        run: |
          set -euo pipefail
          git cat-file -e "${TARGET_SHA}^{commit}"

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/tmp/existing-tag 2>/dev/null; then
            existing=$(awk '{print $1}' /tmp/existing-tag)
            if [ "$existing" != "$TARGET_SHA" ]; then
              echo "Tag ${TAG} already exists at ${existing}, expected ${TARGET_SHA}." >&2
              exit 1
            fi
          else
            git tag "$TAG" "$TARGET_SHA"
            git push origin "refs/tags/${TAG}"
          fi

      - name: Check out release source
        run: git checkout --force "$TARGET_SHA"

      - run: npm ci --ignore-scripts

      - name: Verify version and release notes
        shell: bash
        run: |
          actual=$(node -p "require('./packages/iconography/package.json').version")
          test "$actual" = "$VERSION"
          node tools/release-notes.mjs --version "$VERSION" --out /tmp/release-notes.md
          test -s /tmp/release-notes.md

      - run: npm run build:iconography

      - name: Package release assets
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_DIR="release/est-iconography-${VERSION}"
          mkdir -p "$PACKAGE_DIR"
          cp -R packages/iconography/dist/. "$PACKAGE_DIR/"
          cp packages/iconography/README.md "$PACKAGE_DIR/README.md"
          cp packages/iconography/LICENSE-NOTICE.md "$PACKAGE_DIR/LICENSE-NOTICE.md"

          (
            cd release
            zip -qr "est-iconography-${VERSION}.zip" "est-iconography-${VERSION}"
          )

          cp packages/iconography/dist/sprites/est-ui-icons.svg release/est-ui-icons.svg
          cp packages/iconography/dist/sprites/est-icons.svg release/est-icons.svg
          cp packages/iconography/dist/styles/est-iconography.css release/est-iconography.css
          cp packages/iconography/dist/manifest/assets.json release/est-iconography-assets.json

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists; verifying it instead of replacing it."
          else
            gh release create "$TAG" \
              "release/est-iconography-${VERSION}.zip" \
              "release/est-ui-icons.svg" \
              "release/est-icons.svg" \
              "release/est-iconography.css" \
              "release/est-iconography-assets.json" \
              --verify-tag \
              --notes-file /tmp/release-notes.md \
              --title "EST Iconography ${TAG}"
          fi

      - name: Verify published release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          DOWNLOAD_DIR=/tmp/est-iconography-release
          mkdir -p "$DOWNLOAD_DIR"
          gh release download "$TAG" --dir "$DOWNLOAD_DIR"

          test -s "$DOWNLOAD_DIR/est-iconography-${VERSION}.zip"
          test -s "$DOWNLOAD_DIR/est-ui-icons.svg"
          test -s "$DOWNLOAD_DIR/est-icons.svg"
          test -s "$DOWNLOAD_DIR/est-iconography.css"
          test -s "$DOWNLOAD_DIR/est-iconography-assets.json"

          actual=$(node -e "const fs=require('fs'); const value=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); process.stdout.write(value.libraryVersion)" "$DOWNLOAD_DIR/est-iconography-assets.json")
          test "$actual" = "$VERSION"

          unzip -q "$DOWNLOAD_DIR/est-iconography-${VERSION}.zip" -d /tmp/archive
          test -s "/tmp/archive/est-iconography-${VERSION}/styles/est-iconography.css"
          cmp "$DOWNLOAD_DIR/est-iconography.css" "/tmp/archive/est-iconography-${VERSION}/styles/est-iconography.css"

      - name: Remove temporary release branch
        if: always()
        run: git push origin --delete agent/v0.5-release-runner || true
