name: Validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  iconography:
    name: Validate iconography package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --ignore-scripts
      - run: npm run validate:iconography
      - run: npm run build:iconography
      - name: Verify helper stylesheet output
        run: |
          test -s packages/iconography/dist/styles/est-iconography.css
          grep -q ':where(.est-icon)' packages/iconography/dist/styles/est-iconography.css
          grep -q 'fill: currentColor' packages/iconography/dist/styles/est-iconography.css
      - name: Verify deterministic output
        run: |
          cp -R packages/iconography/dist /tmp/iconography-dist
          npm run build:iconography
          diff -r /tmp/iconography-dist packages/iconography/dist
      - run: npm run test:bundle --workspace @est/iconography
      - run: npm run test:figma --workspace @est/iconography
      - name: Validate current release notes
        run: |
          VERSION=$(node -p "require('./packages/iconography/package.json').version")
          node tools/release-notes.mjs --version "$VERSION" --out /tmp/release-notes.md
          test -s /tmp/release-notes.md

  catalogue:
    name: Build catalogue consumer
    runs-on: ubuntu-latest
    needs: iconography
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --ignore-scripts
      - run: npm run build:iconography
      - run: npm run prepare:catalogue
      - run: node --check catalogue/assets/js/catalogue.js
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: catalogue
      - run: bundle exec jekyll build --strict_front_matter --destination ../_site
        working-directory: catalogue
      - name: Verify catalogue selection hooks
        run: |
          grep -q 'data-selection-tray' _site/index.html
          grep -q 'js-select-asset' _site/index.html
          grep -q 'asset-manifest' _site/index.html
      - name: Verify catalogue accessibility patterns
        run: |
          grep -q 'Accessible icon use' _site/accessibility/index.html
          grep -q 'aria-hidden="true" focusable="false"' _site/accessibility/index.html
          grep -q 'role="img" aria-label="Domestic property"' _site/accessibility/index.html
          grep -q 'aria-label="Add property"' _site/accessibility/index.html
          grep -q 'role="status"' _site/accessibility/index.html
          grep -q 'Accessible implementation' _site/ui-icons/check-circle/index.html
          grep -q 'decorative-usage-example' _site/ui-icons/check-circle/index.html
      - name: Verify catalogue implementation guide
        run: |
          test -s _site/assets/generated/styles/est-iconography.css
          grep -q 'Implement iconography consistently' _site/implementation/index.html
          grep -q 'est-icon--16' _site/implementation/index.html
          grep -q 'est-icon-text' _site/implementation/index.html
          grep -q 'est-icon-button' _site/implementation/index.html
          grep -q '/assets/generated/styles/est-iconography.css' _site/implementation/index.html
