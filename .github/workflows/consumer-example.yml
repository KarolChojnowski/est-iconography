name: Validate consumer example

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  vanilla:
    name: Build vanilla consumer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --ignore-scripts
      - run: npm run test:example
